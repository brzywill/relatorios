<title>Relatório Semanal · Mobgoo</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;
  --surface:#ffffff;
  --border:#d2d2d7;
  --border-light:#e8e8ed;
  --text:#1d1d1f;
  --muted:#6e6e73;
  --faint:#aeaeb2;
  --meta:#0866FF;
  --meta-bg:#f0f4ff;
  --google:#185EA6;
  --google-bg:#eef3fb;
  --green:#1a8a45;
  --green-bg:#f0faf4;
  --red:#cc2222;
  --red-bg:#fff0f0;
  --amber:#a05c00;
  --amber-bg:#fff8ee;
  --r:12px;
  --sh:0 1px 0 rgba(0,0,0,.04);
}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.hdr{background:#1d1d1f;border-bottom:1px solid #000;padding:16px 36px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#1d1d1f;background:#f5f5f7;flex-shrink:0;letter-spacing:-.5px}
.hdr-name{font-size:15px;font-weight:700;color:#f5f5f7;line-height:1.2;letter-spacing:-.2px}
.hdr-sub{font-size:11px;color:#86868b;margin-top:2px;font-weight:500}
.hdr-pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:4px 12px;border-radius:999px;font-size:10px;font-weight:600;border:1px solid #3a3a3c;color:#aeaeb2;background:transparent;letter-spacing:.2px}
.shell{max-width:1200px;margin:0 auto;padding:28px 28px 64px}
.tab-bar{border-bottom:1px solid var(--border-light);margin-top:20px}.tab-bar-inner{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;gap:0}
.tab{border:0;background:none;padding:11px 22px;font:inherit;font-size:12px;font-weight:600;letter-spacing:.2px;color:var(--muted);cursor:pointer;border-bottom:1.5px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;text-transform:uppercase;white-space:nowrap}
.tab:hover{color:var(--text)}.tab.active{color:var(--text);border-bottom-color:var(--text)}
.tab.active.t-meta{color:var(--meta);border-bottom-color:var(--meta)}
.tab.active.t-google{color:var(--google);border-bottom-color:var(--google)}
.tab.active.t-resumo{color:#6b21a8;border-bottom-color:#6b21a8}
.panel{display:none}.panel.active{display:flex;flex-direction:column;gap:16px}
.sec{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.sec-hd{padding:14px 22px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.sec-hd h2{font-size:13px;font-weight:700;letter-spacing:-.1px}
.sec-bd{padding:22px 22px}
.lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--faint)}
.chtag{display:inline-flex;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.2px}
.chtag.meta{background:var(--meta-bg);color:var(--meta);border:1px solid #c8d9ff}
.chtag.google{background:var(--google-bg);color:var(--google);border:1px solid #c4d6f0}
.chtag.resumo{background:#f5f0ff;color:#6b21a8;border:1px solid #d8c8f8}
.hg{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:20px}
.kpi{border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:5px;border:1px solid transparent}
.kpi.blue{background:#1d1d1f;color:#f5f5f7;border-color:#000}
.kpi.dark{background:#3a3a3c;color:#f5f5f7;border-color:#2c2c2e}
.kpi .kl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.6}
.kpi .kv{font-size:26px;font-weight:800;line-height:1;letter-spacing:-.8px;margin-top:2px}
.kpi .ks{font-size:11px;opacity:.5;line-height:1.5;margin-top:4px;font-weight:500}
/* KPI hero tooltip */
.kpi{position:relative;cursor:default}
.kpi-tt{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#fff;color:#1d1d1f;font-size:11px;font-weight:600;line-height:1.4;padding:8px 12px;border-radius:8px;z-index:100;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.18);white-space:nowrap;border:1px solid #e5e5ea;text-align:center}
.kpi-tt .ktt-pct{font-size:14px;font-weight:800;display:block;margin-bottom:2px}
.kpi-tt .ktt-prev{font-size:10px;color:#6e6e73;font-weight:500}
.kpi-tt::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#fff}
.kpi:hover .kpi-tt{display:block}
.mg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.mg3{grid-template-columns:repeat(3,minmax(0,1fr))}
.mc{border:1px solid var(--border-light);border-radius:10px;padding:15px 16px 13px;background:#fff;transition:border-color .15s}
.mc:hover{border-color:var(--border)}
.mc .ml{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin-bottom:8px}
.mc .mv{font-size:19px;font-weight:800;line-height:1;letter-spacing:-.3px;color:var(--text)}
.mc .dl{display:inline-flex;align-items:center;gap:3px;margin-top:8px;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.2px}
.up{background:var(--green-bg);color:var(--green)}.down{background:var(--red-bg);color:var(--red)}.same{background:var(--amber-bg);color:var(--amber)}
.sdiv{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--faint);margin:24px 0 14px;padding-top:20px;border-top:1px solid var(--border-light)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--border)}
th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--faint);padding:9px 12px;text-align:left}
th.r,td.r{text-align:right}
tbody tr{border-bottom:1px solid var(--border-light)}
tbody tr:last-child{border:0}
tbody tr:hover{background:#fafafa}
td{padding:11px 12px;font-size:12px;vertical-align:middle;color:var(--text)}
td.camp{font-weight:600;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.camp-hd{font-weight:700;font-size:11px;letter-spacing:.2px;color:var(--text);background:#f5f5f7}
td.num{font-weight:700;font-variant-numeric:tabular-nums}
.kwg{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:20px}
.kwc{border:1px solid var(--border-light);border-radius:10px;padding:14px;background:#fff;display:flex;flex-direction:column;gap:4px}
.kwc.top1{border-color:#aac4e8;background:var(--google-bg)}
.kwrk{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin-bottom:2px}
.kwn{font-size:12px;font-weight:700;line-height:1.4;word-break:break-word;color:var(--text)}
.kwv{font-size:17px;font-weight:800;color:var(--google);letter-spacing:-.3px}
.kws{font-size:10px;color:var(--muted);font-weight:500}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.ab{border:1px solid var(--border-light);border-radius:10px;padding:18px}
.abt{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.abt em{width:5px;height:5px;border-radius:50%;display:inline-block;font-style:normal}
.ab-pos .abt{color:var(--green)}.ab-pos .abt em{background:var(--green)}
.ab-neg .abt{color:var(--red)}.ab-neg .abt em{background:var(--red)}
.ab-next .abt{color:#6b21a8}.ab-next .abt em{background:#6b21a8}
.ab ul{list-style:none;display:flex;flex-direction:column;gap:10px}
.ab li{font-size:12px;color:var(--muted);line-height:1.7;padding-left:14px;position:relative;font-weight:500}
.ab li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%}
.ab-pos li::before{background:var(--green)}.ab-neg li::before{background:var(--red)}.ab-next li::before{background:#6b21a8}
.footer{text-align:center;padding:22px;font-size:10px;color:var(--faint);border-top:1px solid var(--border-light);letter-spacing:.3px;font-weight:500}
@media(max-width:1000px){.mg{grid-template-columns:repeat(3,minmax(0,1fr))}.kwg{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:700px){.hg,.mg,.mg3,.rg{grid-template-columns:1fr 1fr}.kwg{grid-template-columns:1fr 1fr}.hdr{padding:14px 20px}.shell{padding:18px 16px 48px}}
@media(max-width:480px){.hg,.mg,.mg3,.kwg{grid-template-columns:1fr}.rg{grid-template-columns:1fr}}
/* CAMPAIGN CONTEXT BLOCK */
.ctx-block{background:#fff;border:1px solid var(--border-light);border-radius:var(--r);padding:16px 20px 16px 44px;font-size:13px;color:var(--muted);line-height:1.75;font-weight:500;position:relative}
.ctx-block::before{content:"";position:absolute;left:20px;top:16px;width:4px;height:calc(100% - 32px);background:var(--meta);border-radius:2px;min-height:20px}
.ctx-block.ctx-google::before{background:var(--google)}
/* METRIC CARDS GRID */
.mc-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:4px}
.mc-grid.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}
.mcard{background:#fff;border:1px solid var(--border-light);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:0;transition:border-color .15s}
.mcard:hover{border-color:var(--border)}
.mcard .mc-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin-bottom:10px}
.mcard .mc-cur{font-size:22px;font-weight:800;line-height:1;letter-spacing:-.4px;color:var(--text);font-variant-numeric:tabular-nums}
.mcard .mc-bot{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.mcard .mc-prev{font-size:12px;font-weight:600;color:var(--faint);font-variant-numeric:tabular-nums}
.mcard .mc-bdg{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap}
.mc-bdg.up{background:var(--green-bg);color:var(--green)}
.mc-bdg.down{background:var(--red-bg);color:var(--red)}
.mc-bdg.same{background:var(--amber-bg);color:var(--amber)}
@media(max-width:1000px){.mc-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:700px){.mc-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:400px){.mc-grid{grid-template-columns:1fr}}
/* METRIC TOOLTIP */
.mcard{position:relative}
.mtt{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1d1d1f;color:#f5f5f7;font-size:11px;font-weight:500;line-height:1.5;padding:8px 12px;border-radius:8px;z-index:100;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.22);max-width:220px;white-space:normal;text-align:center}
.mtt::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1d1d1f}
.mcard:hover .mtt{display:block}

</style>
</head>

function metricCards(rows,cols){
  if(!rows||!rows.length)return"";
  // Métricas onde queda = bom (verde) e alta = ruim (vermelho)
  var costKeys=new Set(["custo_conversa","custo_visita","custo_compra","custo_seguidor","cpc","costPerConversion","frequencia"]);
  var costLabels=new Set(["Custo/Conversa","Custo/Compra","Custo/Seguidor","Custo/Visita","CPC médio","Custo/Conv.","Frequência"]);
  // Métricas neutras — não colorir nem verde nem vermelho
  var neutralKeys=new Set(["investimento","impressoes","impressions","alcance","cliques","clicks","frequencia","cost"]);
  var neutralLabels=new Set(["Investimento","Investimento Meta","Investimento Google","Impressões","Alcance","Cliques","Frequência"]);
  var gridCls=cols===3?"mc-grid cols3":"mc-grid";
  var html='<div class="'+gridCls+'">';
  rows.forEach(function(r){
    var d=(Number.isFinite(r.prev)&&r.prev!==0)?((r.cur-r.prev)/Math.abs(r.prev)*100):null;
    var key=r.k||"";
    var lbl=r.label||"";
    var isNeutral=neutralKeys.has(key)||neutralLabels.has(lbl);
    var isCost=costKeys.has(key)||costLabels.has(lbl);
    var cls;
    if(d==null||Math.abs(d)<0.05)cls="same";
    else if(isNeutral)cls="same";
    else if(isCost)cls=d<0?"up":"down";
    else cls=d>0?"up":"down";
    var ar;
    if(cls==="same"||isNeutral)ar="";
    else if(isCost)ar=d<0?"↓ ":"↑ ";
    else ar=d>0?"↑ ":"↓ ";
    var dstr=d==null?"—":(d>0?"+":"")+Number(d).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+"%";
    var tip=METRIC_DESC[key]||METRIC_DESC[lbl]||"";
    html+='<div class="mcard">'+
      (tip?'<div class="mtt">'+tip+'</div>':'')+
      '<div class="mc-label">'+lbl+'</div>'+
      '<div class="mc-cur">'+r.fmtCur+'</div>'+
      '<div class="mc-bot">'+
        '<span class="mc-prev">↙ '+r.fmtPrev+'</span>'+
        '<span class="mc-bdg '+cls+'">'+ar+dstr+'</span>'+
      '</div>'+
    '</div>';
  });
  html+='</div>';
  return html;
}

    var xA=cx-bw-gap/2,xP=cx+gap/2;
    var hA=Math.max((it.cur/max)*chartH,it.cur>0?2:0);
    var hP=Math.max((it.prev/max)*chartH,it.prev>0?2:0);
    var yA=PT+chartH-hA,yP=PT+chartH-hP;
    if(it.cur>0||it.prev>0)bars+="<rect x='"+xA.toFixed(1)+"' y='"+(PT).toFixed(1)+"' width='"+bw+"' height='"+chartH.toFixed(1)+"' fill='#f0f0f5' rx='3'/>";
    if(it.cur>0||it.prev>0)bars+="<rect x='"+xP.toFixed(1)+"' y='"+(PT).toFixed(1)+"' width='"+bw+"' height='"+chartH.toFixed(1)+"' fill='#f0f0f5' rx='3'/>";
    if(hA>0)bars+="<rect x='"+xA.toFixed(1)+"' y='"+yA.toFixed(1)+"' width='"+bw+"' height='"+hA.toFixed(1)+"' fill='"+color+"' rx='3'/>";
    if(hP>0)bars+="<rect x='"+xP.toFixed(1)+"' y='"+yP.toFixed(1)+"' width='"+bw+"' height='"+hP.toFixed(1)+"' fill='#c7c7cc' rx='3'/>";
    if(it.cur>0)vals+="<text x='"+(xA+bw/2).toFixed(1)+"' y='"+(yA-6).toFixed(1)+"' text-anchor='middle' font-size='9' font-weight='700' fill='"+color+"'>"+fmt(it.cur)+"</text>";
    var words=it.label.split(" "),mid=(PT+chartH+14).toFixed(1);
    if(words.length<=2){
      labels+="<text x='"+cx.toFixed(1)+"' y='"+mid+"' text-anchor='middle' font-size='10' fill='#aeaeb2' font-weight='600'>"+it.label+"</text>";
    }else{
      var half=Math.ceil(words.length/2);
      labels+="<text x='"+cx.toFixed(1)+"' y='"+mid+"' text-anchor='middle' font-size='10' fill='#aeaeb2' font-weight='600'>"+words.slice(0,half).join(" ")+"</text>";
      labels+="<text x='"+cx.toFixed(1)+"' y='"+(Number(mid)+13).toFixed(1)+"' text-anchor='middle' font-size='10' fill='#aeaeb2' font-weight='600'>"+words.slice(half).join(" ")+"</text>";
    }
    // Transparent hit zone — data stored as data-* attributes, tooltip handled by one global script
    var enc=encodeURIComponent(JSON.stringify({label:it.label,cur:fmt(it.cur),prev:fmt(it.prev)}));
    bars+="<rect class='barhit' data-bc='"+id+"' data-info='"+enc+"' x='"+(cx-groupW/2).toFixed(1)+"' y='"+PT+"' width='"+groupW.toFixed(1)+"' height='"+chartH+"' fill='transparent'/>";
  });
  var base="<line x1='"+PL+"' y1='"+(PT+chartH)+"' x2='"+(W-PR)+"' y2='"+(PT+chartH)+"' stroke='#d2d2d7' stroke-width='1'/>";
  var leg="<rect x='"+PL+"' y='5' width='8' height='8' fill='"+color+"' rx='2'/><text x='"+(PL+12)+"' y='13' font-size='9' fill='#aeaeb2' font-weight='700' letter-spacing='0.5'>ATUAL</text><rect x='"+(PL+54)+"' y='5' width='8' height='8' fill='#c7c7cc' rx='2'/><text x='"+(PL+66)+"' y='13' font-size='9' fill='#aeaeb2' font-weight='700' letter-spacing='0.5'>ANTERIOR</text>";
  return"<div class='bcwrap' id='"+id+"' style='position:relative;overflow-x:auto;margin:6px 0 4px'>"
    +"<div class='bctt' style='display:none;position:absolute;background:#fff;border:1px solid #d2d2d7;border-radius:8px;padding:10px 12px;pointer-events:none;z-index:50;min-width:140px;box-shadow:0 4px 16px rgba(0,0,0,.12)'></div>"
    +"<svg viewBox='0 0 "+W+" "+H+"' xmlns='http://www.w3.org/2000/svg' style='width:100%;max-width:"+W+"px;height:auto;font-family:Montserrat,sans-serif;display:block'>"+leg+base+bars+vals+labels+"</svg>"
    +"</div>";
}


// Meta hero KPIs
function heroKpiTt(cur,prev,fmt,isNeutralMetric){
  if(!Number.isFinite(prev)||prev===0)return"";
  var d=((cur-prev)/Math.abs(prev)*100);
  var sign=d>0?"+":"";
  var pct=sign+Number(d).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+"%";
  var color=isNeutralMetric?"#6e6e73":d>0?"#1a8a45":"#cc2222";
  return'<div class="kpi-tt"><span class="ktt-pct" style="color:'+color+'">'+pct+'</span><span class="ktt-prev">ant. '+fmt(prev)+'</span></div>';
}
function heroes(){
  const m=D.meta.m,p=D.metaPrev&&D.metaPrev.m||{};
  // Candidate metrics — each: [label, value, formatted, subtitle, fmt, isLowBetter, priority]
  // priority: lower number = shown first when present
  var cands=[
    {k:"roas",       l:"ROAS",          v:m.roas,        f:v=>fdec(v,2),  s:"Retorno sobre investimento", low:false, pri:1},
    {k:"receita",    l:"Receita",        v:m.receita,     f:fcur,          s:"Valor atribuído às compras",  low:false, pri:2},
    {k:"compras",    l:"Compras",        v:m.compras,     f:fint,          s:"Volume de compras",           low:false, pri:3},
    {k:"conversas",  l:"Conversas",      v:m.conversas,   f:fint,          s:"Resultados de mensagens",     low:false, pri:4},
    {k:"custo_conversa",l:"Custo/Conv.", v:m.custo_conversa,f:fcur,        s:"Eficiência das conversas",   low:true,  pri:5},
    {k:"visitas",    l:"Visitas",        v:m.visitas,     f:fint,          s:"Visitas ao perfil",           low:false, pri:6},
    {k:"custo_visita",l:"Custo/Visita",  v:m.custo_visita,f:fcur,          s:"Eficiência do tráfego",       low:true,  pri:7},
    {k:"seguidores", l:"Seguidores",     v:m.seguidores,  f:fint,          s:"Novos seguidores captados",   low:false, pri:8},
    {k:"adicoes_carrinho",l:"Adições Carrinho",v:m.adicoes_carrinho,f:fint,s:"Produtos adicionados",        low:false, pri:9},
    {k:"investimento",l:"Investimento",  v:m.investimento,f:fcur,          s:"Total investido no período",  low:false, pri:99}
  ];
  // Filter to only metrics with real value > 0, sort by priority
  var valid=cands.filter(function(x){return Number.isFinite(x.v)&&x.v>0;}).sort(function(a,b){return a.pri-b.pri;});
  // Always include investimento as last hero if we have fewer than 3
  if(valid.length<3){
    var hasInv=valid.some(function(x){return x.k==="investimento";});
    if(!hasInv&&Number.isFinite(m.investimento)&&m.investimento>0){
      var inv=cands.find(function(x){return x.k==="investimento";});
      if(inv)valid.push(inv);
    }
  }
  // Take top 3
  var chosen=valid.slice(0,3);
  var colors=["blue","dark","dark"];
  return chosen.map(function(x,i){
    var col=colors[i]||"dark";
    var pv=p[x.k];
    return'<div class="kpi '+col+'">'+heroKpiTt(x.v,pv,x.f,x.low)+'<div class="kl">'+x.l+'</div><div class="kv">'+x.f(x.v)+'</div><div class="ks">'+x.s+'</div></div>';
  }).join("");
}

      html+='<tr>'

    {label:"Taxa de Conv.",cur:g.conversionRate,prev:gp.conversionRate||0,fmtCur:fpct(g.conversionRate,2),fmtPrev:fpct(gp.conversionRate||0,2),k:"conversionRate"},
  ].filter(function(r){return(Number.isFinite(r.cur)&&r.cur>0)||(Number.isFinite(r.prev)&&r.prev>0)});

  var gContextHtml=D.analysis&&D.analysis.contextGoogle
    ?'<div class="ctx-block ctx-google">'+D.analysis.contextGoogle+'</div>'
    :gCampaignSummary();

  document.getElementById("panel-google").innerHTML=
    gContextHtml+
    '<div class="sec"><div class="sec-hd"><h2>Visão Geral <span style="color:var(--faint);font-weight:400">— Google Ads</span></h2><div style="display:flex;align-items:center;gap:10px"><span class="lbl">'+D.period+' vs '+D.prevPeriod+'</span><span class="chtag google">Google Ads</span></div></div><div class="sec-bd">'+
    '<div class="hg">'+heroesGoogle()+'</div>'+
    metricCards(googleRows,3)+
    '</div></div>'+
    '<div class="sec"><div class="sec-hd"><h2>Campanhas</h2><span class="chtag google">Google Ads</span></div><div class="sec-bd">'+gRows()+'</div></div>'+
    kwSec;
}

document.getElementById("panel-resumo").innerHTML=
  (function(){
    var metaInv=mp.investimento||0;
    var prevMetaInv=(pp&&pp.investimento)||0;
    var googleInv=D.google&&D.google.m?D.google.m.cost||0:0;
    var prevGoogleInv=D.googlePrev&&D.googlePrev.m?D.googlePrev.m.cost||0:0;

    var breakdown='<div style="display:flex;gap:24px;margin-top:12px;flex-wrap:wrap">';
    breakdown+='<div style="font-size:12px;color:var(--muted);font-weight:500"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--meta);margin-right:6px"></span>Meta Ads: <strong style="color:var(--text)">'+fcur(metaInv)+'</strong></div>';
    if(D.google)breakdown+='<div style="font-size:12px;color:var(--muted);font-weight:500"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--google);margin-right:6px"></span>Google Ads: <strong style="color:var(--text)">'+fcur(googleInv)+'</strong></div>';
    breakdown+='</div>';
    return'<div class="sec"><div class="sec-hd"><h2>Investimento Total</h2><div style="display:flex;align-items:center;gap:10px"><span class="lbl">'+D.reportType+' · '+D.period+'</span><span class="chtag resumo">Resumo</span></div></div><div class="sec-bd">'
      +'<div style="display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap">'
      +'<div style="font-size:38px;font-weight:800;letter-spacing:-1px;color:var(--text);line-height:1">'+fcur(totalInv)+'</div>'
      +'<div style="margin-bottom:6px"><span class="mc-bdg same" style="font-size:11px">'+dstr+' vs anterior</span></div>'
      +'</div>'
      +breakdown
      +'</div></div>';
  })()+
  '<div class="sec"><div class="sec-hd"><h2>Leitura Final</h2><div style="display:flex;align-items:center;gap:10px"><span class="lbl">'+D.reportType+' · '+D.period+'</span><span class="chtag resumo">Resumo</span></div></div><div class="sec-bd">'+
  '<div class="rg">'+
    '<div class="ab ab-pos"><div class="abt"><em></em>Pontos Positivos</div><ul>'+listH(D.analysis.positivos)+'</ul></div>'+
    '<div class="ab ab-neg"><div class="abt"><em></em>Pontos de Atenção</div><ul>'+listH(D.analysis.atencao)+'</ul></div>'+
  '</div>'+
  '<div class="ab ab-next"><div class="abt"><em></em>Próximos Passos</div><ul>'+listH(D.analysis.proximos)+'</ul></div>'+
  '</div></div>';

document.querySelectorAll(".tab").forEach(btn=>btn.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  const panel=document.getElementById("panel-"+btn.dataset.tab);
  if(panel)panel.classList.add("active");
}));
document.getElementById("footer").textContent="Relatório gerado automaticamente em "+D.generatedAt+" · "+D.client;
// ── Bar chart tooltips ──
document.addEventListener("mouseover",function(e){
  var hit=e.target.closest(".barhit");
  if(!hit)return;
  var wrap=hit.closest(".bcwrap");
  if(!wrap)return;
  var tt=wrap.querySelector(".bctt");
  if(!tt)return;
  var info=JSON.parse(decodeURIComponent(hit.getAttribute("data-info")||"{}"));
  tt.innerHTML="<div style='font-size:11px;font-weight:700;margin-bottom:6px;color:#1d1d1f'>"+info.label+"</div>"
    +"<div style='display:flex;flex-direction:column;gap:4px'>"
    +"<div style='display:flex;justify-content:space-between;gap:16px'><span style='font-size:10px;color:#6e6e73;font-weight:600'>Atual</span><span style='font-size:12px;font-weight:800;color:#1d1d1f'>"+info.cur+"</span></div>"
    +"<div style='display:flex;justify-content:space-between;gap:16px'><span style='font-size:10px;color:#6e6e73;font-weight:600'>Anterior</span><span style='font-size:12px;font-weight:700;color:#aeaeb2'>"+info.prev+"</span></div>"
    +"</div>";
  tt.style.display="block";
});
document.addEventListener("mousemove",function(e){
  var hit=e.target.closest(".barhit");
  if(!hit)return;
  var wrap=hit.closest(".bcwrap");
  if(!wrap)return;
  var tt=wrap.querySelector(".bctt");
  if(!tt)return;
  var r=wrap.getBoundingClientRect();
  var x=e.clientX-r.left+14,y=e.clientY-r.top-70;
  if(x+160>r.width)x=e.clientX-r.left-174;
  if(y<0)y=4;
  tt.style.left=x+"px";tt.style.top=y+"px";
});
document.addEventListener("mouseout",function(e){
  var hit=e.target.closest(".barhit");
  if(!hit)return;
  var wrap=hit.closest(".bcwrap");
  if(!wrap)return;
  var related=e.relatedTarget;
  if(related&&wrap.contains(related)&&related.closest(".barhit"))return;
  var tt=wrap.querySelector(".bctt");
  if(tt)tt.style.display="none";
});
</script>
</body>
