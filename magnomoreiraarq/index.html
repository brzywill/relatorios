<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relatório Semanal · Magno Moreira | Arquitetura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;
  --surface:#ffffff;
  --border:#d2d2d7;
  --border-light:#e8e8ed;
  --text:#1d1d1f;
  --muted:#6e6e73;
  --faint:#aeaeb2;
  --meta:#2480f0;
  --meta-2:#1b64d7;
  --meta-bg:#f0f6ff;
  --meta-grad:linear-gradient(135deg,#2480f0 0%,#1b64d7 100%);
  --meta-border-grad:linear-gradient(135deg,rgba(36,128,240,.9),rgba(27,100,215,.45));
  --google:#028cda;
  --google-yellow:#fcba0c;
  --google-green:#13aa46;
  --google-bg:#eef9ff;
  --google-grad:linear-gradient(135deg,#028cda 0%,#028cda 44%,#fcba0c 58%,#13aa46 100%);
  --google-hero-grad:linear-gradient(135deg,#fcba0c 0%,#ffd866 48%,#f59e0b 100%);
  --google-border-grad:linear-gradient(135deg,rgba(2,140,218,.85),rgba(252,186,12,.75),rgba(19,170,70,.7));
  --green:#1a8a45;
  --green-bg:#f0faf4;
  --red:#cc2222;
  --red-bg:#fff0f0;
  --amber:#a05c00;
  --amber-bg:#fff8ee;
  --r:12px;
  --sh:0 1px 0 rgba(0,0,0,.04);
  --ease:cubic-bezier(.2,.8,.2,1);
  --ease-soft:cubic-bezier(.22,1,.36,1);
  --lift:0 14px 30px rgba(29,29,31,.08);
}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
@keyframes reportFadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes reportSlideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes panelEnter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes valuePop{0%{opacity:0;transform:translateY(4px) scale(.99)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes barGrow{from{transform:scaleY(0);opacity:.35}to{transform:scaleY(1);opacity:1}}
@keyframes barSlide{from{transform:scaleX(0);opacity:.35}to{transform:scaleX(1);opacity:1}}
@keyframes softPulse{0%,100%{box-shadow:0 0 0 rgba(8,102,255,0)}50%{box-shadow:0 0 0 5px rgba(8,102,255,.09)}}
.read-progress{position:fixed;top:0;left:0;width:0;height:3px;background:var(--meta-grad);z-index:40;box-shadow:0 0 14px rgba(36,128,240,.45);transition:width .12s linear,background .2s var(--ease)}
body.theme-google .read-progress{background:var(--google-grad);box-shadow:0 0 14px rgba(2,140,218,.36)}
body.theme-resumo .read-progress{background:linear-gradient(135deg,#6b21a8,#9d4edd);box-shadow:0 0 14px rgba(107,33,168,.35)}
.hdr{background:#1d1d1f;border-bottom:1px solid #000;padding:16px 36px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:10;animation:reportSlideDown .48s var(--ease) both}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#1d1d1f;background:#f5f5f7;flex-shrink:0;letter-spacing:-.5px}
.hdr-name{font-size:15px;font-weight:700;color:#f5f5f7;line-height:1.2;letter-spacing:-.2px}
.hdr-sub{font-size:11px;color:#86868b;margin-top:2px;font-weight:500}
.hdr-pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:4px 12px;border-radius:999px;font-size:10px;font-weight:600;border:1px solid #3a3a3c;color:#aeaeb2;background:transparent;letter-spacing:.2px;transition:background .2s var(--ease),border-color .2s var(--ease),color .2s var(--ease)}
.pill:hover{background:#2c2c2e;border-color:#545458;color:#f5f5f7}
.shell{max-width:1200px;margin:0 auto;padding:28px 28px 64px;animation:reportFadeUp .5s var(--ease) .08s both}
.tab-bar{border-bottom:1px solid var(--border-light);margin-top:20px;animation:reportFadeUp .48s var(--ease) .04s both}.tab-bar-inner{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;gap:0}
.tab{border:0;background:none;padding:11px 22px;font:inherit;font-size:12px;font-weight:600;letter-spacing:.2px;color:var(--muted);cursor:pointer;border-bottom:1.5px solid transparent;margin-bottom:-1px;transition:color .2s var(--ease),border-color .2s var(--ease),background .2s var(--ease),transform .2s var(--ease);text-transform:uppercase;white-space:nowrap;border-radius:8px 8px 0 0;display:inline-flex;align-items:center;gap:8px}
.tab:hover{color:var(--text)}.tab.active{color:var(--text);border-bottom-color:var(--text)}
.tab:hover{background:#fff;transform:translateY(-1px)}
.tab.active.t-meta{color:var(--meta);border-bottom-color:var(--meta)}
.tab.active.t-google{color:var(--google);border-bottom-color:var(--google)}
.tab-logo{width:20px;height:20px;border-radius:6px;background:#fff;border:1px solid var(--border-light);display:inline-flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 1px 4px rgba(29,29,31,.08);transition:transform .2s var(--ease),border-color .2s var(--ease),box-shadow .2s var(--ease)}
.tab-logo img{width:16px;height:16px;object-fit:contain;display:block}
.tab.active .tab-logo{transform:scale(1.06);box-shadow:0 4px 12px rgba(29,29,31,.12)}
.tab.active.t-meta .tab-logo{border-color:rgba(36,128,240,.35)}
.tab.active.t-google .tab-logo{border-color:rgba(2,140,218,.35)}
.panel{display:none}.panel.active{display:flex;flex-direction:column;gap:16px;animation:panelEnter .36s var(--ease) both}
.panel.active .sec,.panel.active .ctx-block{animation:reportFadeUp .5s var(--ease) both}
.panel.active .sec:nth-of-type(2){animation-delay:.06s}
.panel.active .sec:nth-of-type(3){animation-delay:.12s}
.panel.active .sec:nth-of-type(4){animation-delay:.18s}
.sec{background:var(--surface);border:0;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;transition:transform .24s var(--ease),box-shadow .24s var(--ease)}
.sec:hover{transform:translateY(-1px);box-shadow:var(--lift)}
.sec-hd{padding:14px 22px;border-bottom:0;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.sec-hd h2{font-size:13px;font-weight:700;letter-spacing:-.1px}
.sec-bd{padding:22px 22px}
.lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--faint)}
.chtag{display:inline-flex;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.2px}
.chtag.meta{background:var(--meta-bg);color:var(--meta);border:1px solid rgba(36,128,240,.26)}
.chtag.google{background:var(--google-bg);color:var(--google);border:1px solid rgba(2,140,218,.26)}
.chtag.resumo{background:#f5f0ff;color:#6b21a8;border:1px solid #d8c8f8}
.hg{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:20px}
.kpi{border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:5px;border:1px solid transparent;animation:reportFadeUp .42s var(--ease) both;transition:transform .34s var(--ease-soft),box-shadow .34s var(--ease-soft),border-color .34s var(--ease-soft)}
.kpi:nth-child(2){animation-delay:.05s}.kpi:nth-child(3){animation-delay:.1s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(29,29,31,.12)}
.kpi.blue{background:#1d1d1f;color:#f5f5f7;border-color:#000}
.kpi.dark{background:#3a3a3c;color:#f5f5f7;border-color:#2c2c2e}
#panel-meta .kpi{background:var(--meta-grad) padding-box,var(--meta-border-grad) border-box;color:#fff;border:1px solid transparent;box-shadow:0 14px 30px rgba(36,128,240,.18)}
#panel-google .kpi{background:var(--google-hero-grad) padding-box,var(--google-border-grad) border-box;color:#1d1d1f;border:1px solid transparent;box-shadow:0 14px 30px rgba(252,186,12,.2);text-shadow:none}
#panel-meta .kpi .kl,#panel-meta .kpi .ks,#panel-google .kpi .kl,#panel-google .kpi .ks{opacity:.72}
.kpi .kl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.6}
.kpi .kv{font-size:26px;font-weight:800;line-height:1;letter-spacing:-.8px;margin-top:2px;animation:valuePop .52s var(--ease) both}
.kpi .ks{font-size:11px;opacity:.5;line-height:1.5;margin-top:4px;font-weight:500}
/* KPI hero tooltip */
.kpi{position:relative;cursor:default}
.kpi-tt{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#fff;color:#1d1d1f;font-size:11px;font-weight:600;line-height:1.4;padding:8px 12px;border-radius:8px;z-index:100;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.18);white-space:nowrap;border:1px solid #e5e5ea;text-align:center}
.kpi-tt .ktt-pct{font-size:14px;font-weight:800;display:block;margin-bottom:2px}
.kpi-tt .ktt-prev{font-size:10px;color:#6e6e73;font-weight:500}
.kpi-tt::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#fff}
.kpi:hover .kpi-tt{display:block}
.mg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.mg3{grid-template-columns:repeat(3,minmax(0,1fr))}
.mc{border:1px solid var(--border-light);border-radius:10px;padding:15px 16px 13px;background:#fff;transition:transform .34s var(--ease-soft),border-color .34s var(--ease-soft),box-shadow .34s var(--ease-soft);animation:reportFadeUp .38s var(--ease) both}
#panel-meta .mc{border:1px solid transparent;background:linear-gradient(#fff,#fff) padding-box,var(--meta-border-grad) border-box}
#panel-google .mc{border:1px solid transparent;background:linear-gradient(#fff,#fff) padding-box,var(--google-border-grad) border-box}
.mc:hover{border-color:var(--border);transform:translateY(-2px);box-shadow:0 10px 22px rgba(29,29,31,.055)}
.mc .ml{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin-bottom:8px}
.mc .mv{font-size:19px;font-weight:800;line-height:1;letter-spacing:-.3px;color:var(--text)}
.mc .dl{display:inline-flex;align-items:center;gap:3px;margin-top:8px;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.2px}
.mc-alert{display:inline-block;margin-top:5px;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.3px}
.mc-alert-red{background:#fee2e2;color:#b91c1c}
.mc-alert-amber{background:#fef3c7;color:#92400e}
.up{background:var(--green-bg);color:var(--green)}.down{background:var(--red-bg);color:var(--red)}.same{background:var(--amber-bg);color:var(--amber)}
.sdiv{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--faint);margin:24px 0 14px;padding-top:20px;border-top:1px solid var(--border-light)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--border)}
th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--faint);padding:9px 12px;text-align:left}
th.r,td.r{text-align:right}
tbody tr{border-bottom:1px solid var(--border-light);transition:background .18s var(--ease),box-shadow .18s var(--ease)}
tbody tr:last-child{border:0}
tbody tr:hover{background:#fafafa;box-shadow:inset 3px 0 0 var(--meta)}
#panel-google tbody tr:hover{box-shadow:inset 3px 0 0 var(--google-green)}
td{padding:11px 12px;font-size:12px;vertical-align:middle;color:var(--text)}
td.camp{font-weight:600;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.camp-hd{font-weight:700;font-size:11px;letter-spacing:.2px;color:var(--text);background:#f5f5f7}
td.num{font-weight:700;font-variant-numeric:tabular-nums}
.kwg{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:20px}
.kwc{border:1px solid transparent;border-radius:10px;padding:14px;background:linear-gradient(#fff,#fff) padding-box,var(--google-border-grad) border-box;display:flex;flex-direction:column;gap:4px;transition:transform .34s var(--ease-soft),box-shadow .34s var(--ease-soft),border-color .34s var(--ease-soft);animation:reportFadeUp .4s var(--ease) both}
.kwc:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(24,94,166,.08);border-color:#c4d6f0}
.kwc.top1{background:linear-gradient(var(--google-bg),var(--google-bg)) padding-box,var(--google-border-grad) border-box;animation:reportFadeUp .45s var(--ease) both,softPulse 2.4s ease-in-out .7s 2}
.kwrk{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin-bottom:2px}
.kwn{font-size:12px;font-weight:700;line-height:1.4;word-break:break-word;color:var(--text)}
.kwv{font-size:17px;font-weight:800;color:var(--google);letter-spacing:-.3px}
.kws{font-size:10px;color:var(--muted);font-weight:500}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.ab{border:1px solid var(--border-light);border-radius:10px;padding:18px;transition:transform .34s var(--ease-soft),box-shadow .34s var(--ease-soft),border-color .34s var(--ease-soft);animation:reportFadeUp .42s var(--ease) both}
.ab:hover{transform:translateY(-2px);box-shadow:var(--lift);border-color:var(--border)}
.abt{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.abt em{width:5px;height:5px;border-radius:50%;display:inline-block;font-style:normal}
.ab-pos .abt{color:var(--green)}.ab-pos .abt em{background:var(--green)}
.ab-neg .abt{color:var(--red)}.ab-neg .abt em{background:var(--red)}
.ab-next .abt{color:#6b21a8}.ab-next .abt em{background:#6b21a8}
.ab ul{list-style:none;display:flex;flex-direction:column;gap:10px}
.ab li{font-size:12px;color:var(--muted);line-height:1.7;padding-left:14px;position:relative;font-weight:500}
.ab li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%}
.ab-pos li::before{background:var(--green)}.ab-neg li::before{background:var(--red)}.ab-next li::before{background:#6b21a8}
.footer{text-align:center;padding:22px;font-size:10px;color:var(--faint);border-top:1px solid var(--border-light);letter-spacing:.3px;font-weight:500}
.eff-grid{display:grid;grid-template-columns:minmax(0,.96fr) minmax(0,1.04fr);gap:12px;align-items:stretch}
.eff-card{border:1px solid transparent;border-radius:10px;background:linear-gradient(#fff,#fff) padding-box,var(--meta-border-grad) border-box;padding:16px;min-height:300px;animation:reportFadeUp .42s var(--ease) both;transition:transform .34s var(--ease-soft),box-shadow .34s var(--ease-soft)}
#panel-google .eff-card{background:linear-gradient(#fff,#fff) padding-box,var(--google-border-grad) border-box}
.eff-card:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(29,29,31,.065)}
.eff-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin-bottom:5px}
.eff-sub{font-size:12px;color:var(--muted);line-height:1.55;font-weight:500}
.cost-bars{display:grid;gap:11px;margin-top:16px}
.cost-row{display:grid;grid-template-columns:minmax(130px,1fr) minmax(118px,1.1fr) minmax(72px,auto);gap:12px;align-items:center}
.cost-name{min-width:0}
.cost-name strong{display:block;font-size:12px;color:var(--text);font-weight:700;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cost-name span{display:block;margin-top:3px;font-size:10px;color:var(--faint);font-weight:700}
.cost-name em{display:block;margin-top:2px;font-size:9px;color:var(--muted);font-style:normal;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cost-track{height:9px;border-radius:999px;background:#f0f0f5;overflow:hidden}
.cost-fill{height:100%;min-width:3px;border-radius:999px;background:var(--meta-grad);transform-origin:left center;animation:barSlide .62s var(--ease) both}
#panel-google .cost-fill{background:var(--google-hero-grad)}
.cost-value{text-align:right;font-size:12px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums}
.cost-value span{display:block;margin-top:3px;font-size:9px;color:var(--faint);font-weight:700}
.quad{position:relative;height:252px;margin-top:16px;border:1px solid var(--border-light);border-radius:10px;overflow:hidden;background:linear-gradient(90deg,rgba(204,34,34,.07),rgba(26,138,69,.08)),linear-gradient(180deg,rgba(204,34,34,.08),rgba(26,138,69,.06)),#fff}
.quad::before,.quad::after{content:"";position:absolute;background:rgba(110,110,115,.22);z-index:1}
.quad::before{left:50%;top:0;bottom:0;width:1px}
.quad::after{left:0;right:0;top:50%;height:1px}
.quad-axis{position:absolute;z-index:2;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:rgba(110,110,115,.72);pointer-events:none}
.quad-axis.x{right:10px;bottom:8px}.quad-axis.y{left:10px;top:8px}.quad-axis.y2{left:10px;bottom:8px}
.quad-label{position:absolute;z-index:2;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:4px 6px;border-radius:4px;background:rgba(255,255,255,.72);color:var(--muted);pointer-events:none}
.quad-label.good{right:9px;bottom:26px;color:var(--green)}
.quad-label.review{left:9px;top:26px;color:var(--red)}
.quad-label.optimize{right:9px;top:26px;color:var(--amber)}
.quad-label.watch{left:9px;bottom:26px;color:var(--muted)}
.qdot{position:absolute;z-index:4;width:24px;height:24px;border-radius:999px;background:var(--meta-grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;box-shadow:0 8px 18px rgba(36,128,240,.22);transform:translate(-50%,-50%);transition:transform .2s var(--ease),box-shadow .2s var(--ease)}
#panel-google .qdot{background:var(--google-hero-grad);color:#1d1d1f;box-shadow:0 8px 18px rgba(252,186,12,.25)}
.qdot:hover{transform:translate(-50%,-50%) scale(1.12);box-shadow:0 12px 24px rgba(29,29,31,.18)}
.quad-legend{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px 12px;margin-top:12px}
.quad-item{display:flex;align-items:center;gap:7px;min-width:0;font-size:10.5px;color:var(--muted);font-weight:600}
.quad-item b{width:18px;height:18px;border-radius:999px;background:var(--meta-grad);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:9px;flex:0 0 auto}
#panel-google .quad-item b{background:var(--google-hero-grad);color:#1d1d1f}
.quad-item span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eff-empty{height:220px;display:grid;place-items:center;text-align:center;color:var(--faint);font-size:12px;line-height:1.6;padding:18px}
.mix-grid{display:grid;gap:12px}
.mix-row{border:1px solid var(--border-light);border-radius:10px;padding:14px;background:#fff;transition:transform .34s var(--ease-soft),box-shadow .34s var(--ease-soft)}
.mix-row:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(29,29,31,.055)}
.mix-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:10px}
.mix-name{display:flex;align-items:center;gap:8px;min-width:0;font-size:12px;font-weight:800;color:var(--text)}
.mix-dot{width:9px;height:9px;border-radius:999px;background:var(--meta-grad);flex:0 0 auto}
.mix-row.google .mix-dot{background:var(--google-hero-grad)}
.mix-head strong{font-size:13px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;white-space:nowrap}
.mix-track{height:10px;border-radius:999px;background:#f0f0f5;overflow:hidden}
.mix-fill{height:100%;min-width:4px;border-radius:999px;background:var(--meta-grad);transform-origin:left center;animation:barSlide .62s var(--ease) both}
.mix-row.google .mix-fill{background:var(--google-hero-grad)}
.mix-stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.mix-stats span{font-size:10px;font-weight:700;color:var(--muted)}
.decision-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.decision-card{border:1px solid var(--border-light);border-radius:10px;padding:16px;background:#fff;min-height:154px;display:flex;flex-direction:column;gap:9px;transition:transform .34s var(--ease-soft),box-shadow .34s var(--ease-soft);animation:reportFadeUp .42s var(--ease) both}

function metricCards(rows,cols){
  if(!rows||!rows.length)return"";
  // Métricas onde queda = bom (verde) e alta = ruim (vermelho)
  var costKeys=new Set(["frequencia"]);
  var costLabels=new Set(["Frequência"]);
  // Métricas neutras — não colorir nem verde nem vermelho
  var neutralKeys=new Set(["investimento","impressoes","impressions","alcance","cliques","clicks","frequencia","cost"]);
  var neutralLabels=new Set(["Investimento","Investimento Meta","Investimento Google","Impressões","Alcance","Cliques","Frequência"]);
  var gridCls=cols===3?"mc-grid cols3":"mc-grid";
  var html='<div class="'+gridCls+'">';
  rows.forEach(function(r){
    var d=(Number.isFinite(r.prev)&&r.prev!==0)?((r.cur-r.prev)/Math.abs(r.prev)*100):null;
    var key=r.k||"";
    var lbl=r.label||"";
    var isNeutral=neutralKeys.has(key)||neutralLabels.has(lbl);
    var isCost=costKeys.has(key)||costLabels.has(lbl)||isCostEfficiencyMetric(key,lbl);
    var cls;
    if(d==null||Math.abs(d)<0.05)cls="same";
    else if(isNeutral)cls="same";
    else if(isCost)cls=d<0?"up":"down";
    else cls=d>0?"up":"down";
    var ar;
    if(cls==="same"||isNeutral)ar="";
    else if(isCost)ar=d<0?"↓ ":"↑ ";
    else ar=d>0?"↑ ":"↓ ";
    var dstr=d==null?"—":(d>0?"+":"")+Number(d).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+"%";
    var tip=METRIC_DESC[key]||METRIC_DESC[lbl]||"";
    html+='<div class="mcard">'+
      (tip?'<div class="mtt">'+tip+'</div>':'')+
      '<div class="mc-label">'+lbl+'</div>'+
      '<div class="mc-cur">'+r.fmtCur+'</div>'+
      '<div class="mc-bot">'+
        '<span class="mc-prev">↙ '+r.fmtPrev+'</span>'+
        '<span class="mc-bdg '+cls+'">'+ar+dstr+'</span>'+
      '</div>'+
      hoverPanel(lbl,key,r.cur,r.prev,function(){return r.fmtPrev},isNeutral)+
    '</div>';
  });
  html+='</div>';
  return html;
}

function shortLabel(s,n){

function median(vals){
  vals=vals.filter(function(v){return Number.isFinite(v);}).sort(function(a,b){return a-b;});
  if(!vals.length)return 0;

  return vals.length%2?vals[mid]:(vals[mid-1]+vals[mid])/2;

function plain(s){

  var medR=median(results),medC=median(costs);

  visible.forEach(function(r,i){

    var ny=maxC===minC?0.5:(r.cost-minC)/(maxC-minC);

function hoverPanel(label,key,cur,prev,fmt,isNeutralMetric){
  var d=(Number.isFinite(prev)&&prev!==0)?((cur-prev)/Math.abs(prev)*100):null;
  var cls=isNeutralMetric?"same":trend(key,d,label);
  var dstr=d==null?"Sem base":(d>0?"+":"")+Number(d).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+"%";
  var desc=METRIC_DESC[key]||METRIC_DESC[label]||"";
  return'<div class="card-hover">'+
    '<div class="hover-kicker">'+hoverPeriodLabel()+'</div>'+
    '<div class="hover-line"><span class="hover-prev">'+fmt(prev||0)+'</span><span class="hover-var '+cls+'">'+dstr+'</span></div>'+
    (desc?'<p class="hover-desc">'+desc+'</p>':"")+
  '</div>';
}
function heroKpiTt(cur,prev,fmt,isNeutralMetric,key,label){
  return hoverPanel(label||"",key||label||"",cur,prev,fmt,isNeutralMetric);
}
function heroFormatter(type){
  if(type==="currency"||type==="currency_rate")return fcur;
  if(type==="percent")return function(v){return fpct(v,2)};
  if(type==="decimal")return function(v){return fdec(v,2)};
  return function(v){return Math.abs((v||0)%1)<.01?fint(v):fdec(v,2)};
}
function selectedHeroMetrics(platform){

    {k:"thruplay",   l:"Thruplay",       v:m.thruplay,    f:fint,          s:"Visualizações qualificadas",  low:false, pri:11},
    {k:"alcance",    l:"Alcance",        v:m.alcance,     f:fint,          s:"Pessoas alcançadas",          low:false, pri:12},

    {label:"Cliques",cur:mp.cliques,prev:pp.cliques,fmtCur:fint(mp.cliques),fmtPrev:fint(pp.cliques),k:"cliques"},
    {label:"CTR",cur:mp.ctr,prev:pp.ctr,fmtCur:fpct(mp.ctr,2),fmtPrev:fpct(pp.ctr,2),k:"ctr"},
    {label:"CPC médio",cur:mp.cpc,prev:pp.cpc,fmtCur:fcur(mp.cpc),fmtPrev:fcur(pp.cpc),k:"cpc"},
    {label:"Frequência",cur:mp.frequencia,prev:pp.frequencia,fmtCur:fdec(mp.frequencia,2),fmtPrev:fdec(pp.frequencia,2),k:"frequencia"},
    {label:"Conversas",cur:mp.conversas,prev:pp.conversas,fmtCur:fint(mp.conversas),fmtPrev:fint(pp.conversas),k:"conversas"},
    {label:"Custo/Conversa",cur:mp.custo_conversa,prev:pp.custo_conversa,fmtCur:fcur(mp.custo_conversa),fmtPrev:fcur(pp.custo_conversa),k:"custo_conversa"},
    {label:"Compras",cur:mp.compras,prev:pp.compras,fmtCur:fint(mp.compras),fmtPrev:fint(pp.compras),k:"compras"},
    {label:"Custo/Compra",cur:mp.custo_compra,prev:pp.custo_compra,fmtCur:fcur(mp.custo_compra),fmtPrev:fcur(pp.custo_compra),k:"custo_compra"},
    {label:"Seguidores",cur:mp.seguidores,prev:pp.seguidores,fmtCur:fint(mp.seguidores),fmtPrev:fint(pp.seguidores),k:"seguidores"},
    {label:"Custo/Seguidor",cur:mp.custo_seguidor,prev:pp.custo_seguidor,fmtCur:fcur(mp.custo_seguidor),fmtPrev:fcur(pp.custo_seguidor),k:"custo_seguidor"},
    {label:"Visitas ao Perfil",cur:mp.visitas,prev:pp.visitas,fmtCur:fint(mp.visitas),fmtPrev:fint(pp.visitas),k:"visitas"},
    {label:"Custo/Visita",cur:mp.custo_visita,prev:pp.custo_visita,fmtCur:fcur(mp.custo_visita),fmtPrev:fcur(pp.custo_visita),k:"custo_visita"},
    {label:"ROAS",cur:mp.roas,prev:pp.roas,fmtCur:fdec(mp.roas),fmtPrev:fdec(pp.roas),k:"roas"},
    {label:"Receita",cur:mp.receita,prev:pp.receita,fmtCur:fcur(mp.receita),fmtPrev:fcur(pp.receita),k:"receita"},
    {label:"Adições Carrinho",cur:mp.adicoes_carrinho,prev:pp.adicoes_carrinho,fmtCur:fint(mp.adicoes_carrinho),fmtPrev:fint(pp.adicoes_carrinho),k:"adicoes_carrinho"},
    {label:"Thruplay",cur:mp.thruplay,prev:pp.thruplay,fmtCur:fint(mp.thruplay),fmtPrev:fint(pp.thruplay),k:"thruplay"},
  ];
  all=all.concat(extraMetricRows(D.meta,D.metaPrev));
  return all.map(function(r,i){r._i=i;return r;}).filter(function(r){
    if(heroKeys.has(r.k))return false;
    return r._extra||(Number.isFinite(r.cur)&&r.cur>0)||(Number.isFinite(r.prev)&&r.prev>0);
  }).sort(function(a,b){return metricRank(a.k,order,a._i)-metricRank(b.k,order,b._i);});
})();

var metaCtxHtml=D.analysis&&D.analysis.contextMeta
  ?'<div class="ctx-block">'+D.analysis.contextMeta+'</div>'
  :metaCampaignSummary();
function hoverHint(){
  var isTouchDevice=("ontouchstart" in window)||navigator.maxTouchPoints>0;
  var icon='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  var action=isTouchDevice?"Toque":"Passe o mouse";
  return'<div style="display:flex;align-items:flex-start;gap:8px;background:rgba(108,108,120,.07);border:1px solid rgba(108,108,120,.15);border-radius:8px;padding:10px 14px;margin-bottom:14px;color:#6c6c78;font-size:11.5px;font-weight:600;line-height:1.5">'+icon+'<span>'+action+' nos <strong style="color:#1d1d1f">indicadores principais</strong> e nos <strong style="color:#1d1d1f">cards de métricas</strong> para visualizar os dados do período anterior.</span></div>';
}
if(document.getElementById("panel-meta"))document.getElementById("panel-meta").innerHTML=
  metaCtxHtml+
  '<div class="sec"><div class="sec-hd"><h2>Visão Geral <span style="color:var(--faint);font-weight:400">— Meta Ads</span></h2><div style="display:flex;align-items:center;gap:10px"><span class="lbl">'+D.period+' vs '+D.prevPeriod+'</span><span class="chtag meta">Meta Ads</span></div></div><div class="sec-bd">'+
  hoverHint()+
  '<div class="hg">'+heroes()+'</div>'+
  metricCards(metaRows)+
  '</div></div>'+
  metaVisualTools()+
  '<div class="sec"><div class="sec-hd"><h2>Desempenho por Conjunto</h2><span class="lbl">Separado por tipo de resultado</span></div><div class="sec-bd">'+breakdown()+'</div></div>';

if(D.google){
  const g=D.google.m,gp=(D.googlePrev&&D.googlePrev.m)||{};
  var gChartItems=[
    {label:"Cliques",cur:g.clicks||0,prev:gp.clicks||0},
    {label:"Conversoes",cur:g.conversions||0,prev:gp.conversions||0},
    {label:"Custo",cur:g.cost||0,prev:gp.cost||0,fmt:fcur}
  ].filter(function(i){return i.cur>0||i.prev>0});
  var googleChart=gChartItems.length?'<div style="margin-top:18px;padding-top:18px;border-top:1px solid var(--border-light)"><div class="sdiv" style="margin-top:0;padding-top:0;border:none">Comparativo</div>'+barChart(gChartItems,"#028cda")+'</div>':"";
  const hasKw=D.keywords&&D.keywords.length>0;
  const kwSec=hasKw
    ?'<div class="sec"><div class="sec-hd"><h2>Top 5 Palavras-chave</h2><span class="chtag google">Google Ads · por cliques</span></div><div class="sec-bd">'+kwTop5()+'<div class="sdiv">Todas as palavras-chave</div>'+kwTable()+'</div></div>'
    :'<div class="sec"><div class="sec-hd"><h2>Palavras-chave</h2><span class="lbl">Relatório não enviado</span></div><div class="sec-bd">'+kwTable()+'</div></div>';

  const googleRows=customMetricRows("google")||([
    {label:"Investimento",cur:g.cost||0,prev:gp.cost||0,fmtCur:fcur(g.cost||0),fmtPrev:fcur(gp.cost||0),k:"cost",neutral:true},
    {label:"Conversões",cur:g.conversions||0,prev:gp.conversions||0,fmtCur:fint(g.conversions||0),fmtPrev:fint(gp.conversions||0),k:"conversions"},
    {label:"Custo/Conv.",cur:g.costPerConversion||0,prev:gp.costPerConversion||0,fmtCur:fcur(g.costPerConversion||0),fmtPrev:fcur(gp.costPerConversion||0),k:"costPerConversion"},
    {label:"Cliques",cur:g.clicks||0,prev:gp.clicks||0,fmtCur:fint(g.clicks||0),fmtPrev:fint(gp.clicks||0),k:"clicks"},
    {label:"Impressões",cur:g.impressions||0,prev:gp.impressions||0,fmtCur:fint(g.impressions||0),fmtPrev:fint(gp.impressions||0),k:"impressions"},
    {label:"CTR",cur:g.ctr||0,prev:gp.ctr||0,fmtCur:fpct(g.ctr||0,2),fmtPrev:fpct(gp.ctr||0,2),k:"ctr"},
    {label:"CPC médio",cur:g.cpc||0,prev:gp.cpc||0,fmtCur:fcur(g.cpc||0),fmtPrev:fcur(gp.cpc||0),k:"cpc"},
    {label:"Taxa de Conv.",cur:g.conversionRate||0,prev:gp.conversionRate||0,fmtCur:fpct(g.conversionRate||0,2),fmtPrev:fpct(gp.conversionRate||0,2),k:"conversionRate"},
  ].concat(extraMetricRows(D.google,D.googlePrev)).map(function(r,i){r._i=i;return r;}).filter(function(r){return r._extra||(Number.isFinite(r.cur)&&r.cur>0)||(Number.isFinite(r.prev)&&r.prev>0)})
    .sort(function(a,b){var order=objectiveOrder("google");return metricRank(a.k,order,a._i)-metricRank(b.k,order,b._i);}));

  var gContextHtml=D.analysis&&D.analysis.contextGoogle
    ?'<div class="ctx-block ctx-google">'+D.analysis.contextGoogle+'</div>'
    :gCampaignSummary();
  document.getElementById("panel-google").innerHTML=
    gContextHtml+
    '<div class="sec"><div class="sec-hd"><h2>Visão Geral <span style="color:var(--faint);font-weight:400">— Google Ads</span></h2><div style="display:flex;align-items:center;gap:10px"><span class="lbl">'+D.period+' vs '+D.prevPeriod+'</span><span class="chtag google">Google Ads</span></div></div><div class="sec-bd">'+
    hoverHint()+
    '<div class="hg">'+heroesGoogle()+'</div>'+
    metricCards(googleRows,3)+
    '</div></div>'+
    kwSec;
}

document.querySelectorAll(".tab").forEach(btn=>btn.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  const panel=document.getElementById("panel-"+btn.dataset.tab);
  if(panel)panel.classList.add("active");
  document.body.classList.remove("theme-meta","theme-google","theme-resumo");
  document.body.classList.add("theme-"+btn.dataset.tab);
  updateReadProgress();
}));
document.getElementById("footer").textContent="Relatório gerado automaticamente em "+D.generatedAt+" · "+D.client;
// Touch support for metric card and KPI hover panels
document.addEventListener("touchstart",function(e){
  var card=e.target.closest(".mcard,.kpi");
  document.querySelectorAll(".mcard.touch-active,.kpi.touch-active").forEach(function(el){if(el!==card)el.classList.remove("touch-active");});
  if(card){card.classList.toggle("touch-active");}
},{passive:true});
const readProgress=document.getElementById("readProgress");
function updateReadProgress(){
  if(!readProgress)return;
  var max=document.documentElement.scrollHeight-window.innerHeight;
  var pct=max>0?(window.scrollY/max*100):0;
  readProgress.style.width=Math.max(0,Math.min(100,pct))+"%";
}
updateReadProgress();
window.addEventListener("scroll",updateReadProgress,{passive:true});
window.addEventListener("resize",updateReadProgress);
// ── Bar chart tooltips ──
// Touch support for bar charts
document.addEventListener("touchstart",function(e){
  var hit=e.target.closest(".barhit");
  if(!hit){document.querySelectorAll(".bctt").forEach(function(t){t.style.display="none";});return;}
  var wrap=hit.closest(".bcwrap");
  if(!wrap)return;
  var tt=wrap.querySelector(".bctt");
  if(!tt)return;
  var info=JSON.parse(decodeURIComponent(hit.getAttribute("data-info")||"{}"));
  tt.innerHTML="<div style='font-size:11px;font-weight:700;margin-bottom:6px;color:#1d1d1f'>"+info.label+"</div>"
    +"<div style='display:flex;flex-direction:column;gap:4px'>"
    +"<div style='display:flex;justify-content:space-between;gap:16px'><span style='font-size:10px;color:#6e6e73;font-weight:600'>Atual</span><span style='font-size:12px;font-weight:800;color:#1d1d1f'>"+info.cur+"</span></div>"
    +"<div style='display:flex;justify-content:space-between;gap:16px'><span style='font-size:10px;color:#6e6e73;font-weight:600'>Anterior</span><span style='font-size:12px;font-weight:700;color:#aeaeb2'>"+info.prev+"</span></div>"
    +"</div>";
  tt.style.display="block";
  var r=wrap.getBoundingClientRect();
  var touch=e.touches[0];
  var x=touch.clientX-r.left+14,y=touch.clientY-r.top-70;
  if(x+160>r.width)x=touch.clientX-r.left-174;
  if(y<0)y=4;
  tt.style.left=x+"px";tt.style.top=y+"px";
  e.preventDefault();
},{passive:false});
document.addEventListener("mouseover",function(e){
  var hit=e.target.closest(".barhit");
  if(!hit)return;
  var wrap=hit.closest(".bcwrap");
  if(!wrap)return;
  var tt=wrap.querySelector(".bctt");
  if(!tt)return;
  var info=JSON.parse(decodeURIComponent(hit.getAttribute("data-info")||"{}"));
  tt.innerHTML="<div style='font-size:11px;font-weight:700;margin-bottom:6px;color:#1d1d1f'>"+info.label+"</div>"
    +"<div style='display:flex;flex-direction:column;gap:4px'>"
    +"<div style='display:flex;justify-content:space-between;gap:16px'><span style='font-size:10px;color:#6e6e73;font-weight:600'>Atual</span><span style='font-size:12px;font-weight:800;color:#1d1d1f'>"+info.cur+"</span></div>"
    +"<div style='display:flex;justify-content:space-between;gap:16px'><span style='font-size:10px;color:#6e6e73;font-weight:600'>Anterior</span><span style='font-size:12px;font-weight:700;color:#aeaeb2'>"+info.prev+"</span></div>"
    +"</div>";
  tt.style.display="block";
});
document.addEventListener("mousemove",function(e){
  var hit=e.target.closest(".barhit");
  if(!hit)return;
  var wrap=hit.closest(".bcwrap");
  if(!wrap)return;
  var tt=wrap.querySelector(".bctt");
  if(!tt)return;
  var r=wrap.getBoundingClientRect();
  var x=e.clientX-r.left+14,y=e.clientY-r.top-70;
  if(x+160>r.width)x=e.clientX-r.left-174;
  if(y<0)y=4;
  tt.style.left=x+"px";tt.style.top=y+"px";
});
document.addEventListener("mouseout",function(e){
  var hit=e.target.closest(".barhit");
  if(!hit)return;
  var wrap=hit.closest(".bcwrap");
  if(!wrap)return;
  var related=e.relatedTarget;
  if(related&&wrap.contains(related)&&related.closest(".barhit"))return;
  var tt=wrap.querySelector(".bctt");
  if(tt)tt.style.display="none";
});
</script>
