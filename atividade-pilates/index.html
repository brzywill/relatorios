    * { box-sizing: border-box; }
    body {

      font-family: "Montserrat", Arial, sans-serif;

    .wrap { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
    header { padding: 34px 0 22px; border-bottom: 1px solid var(--line); }

    .subtitle { margin: 14px 0 0; max-width: 920px; color: var(--muted); line-height: 1.6; font-size: 15px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; padding: 22px 0; position: sticky; top: 0; background: rgba(5,5,5,.94); backdrop-filter: blur(12px); z-index: 3; }
    .tab {
      border: 1px solid var(--line);
      background: #0b0b0b;
      color: var(--text);
      padding: 11px 14px;
      border-radius: 8px;

      font-family: inherit;
      font-weight: 700;
      font-size: 13px;
    }
    .tab.active { border-color: var(--green); color: var(--green); }
    main { padding-bottom: 42px; }
    .section-head { display: flex; align-items: end; justify-content: space-between; gap: 18px; margin: 12px 0 18px; }
    h2 { margin: 0; font-size: clamp(22px, 3vw, 34px); }
    .periods { color: var(--muted); font-size: 13px; line-height: 1.6; text-align: right; }
    .kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
    .kpi { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; min-height: 128px; display: flex; flex-direction: column; justify-content: space-between; }
    .label { color: var(--muted); font-size: 12px; text-transform: uppercase; font-weight: 700; letter-spacing: 0; }
    .value { font-size: clamp(22px, 2.5vw, 32px); font-weight: 800; margin-top: 10px; white-space: nowrap; line-height: 1.05; }
    .delta { margin-top: 8px; font-size: 13px; font-weight: 700; }
    .up { color: var(--green); }
    .down { color: var(--red); }
    .neutral { color: var(--muted); }
    .grid { display: grid; grid-template-columns: 1fr; gap: 14px; align-items: start; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    th, td { padding: 12px 11px; border-bottom: 1px solid var(--line); text-align: right; font-size: 12px; vertical-align: middle; }
    th:first-child, td:first-child { text-align: left; }
    th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0; background: #0c0c0c; }
    tr:last-child td { border-bottom: 0; }
    th:first-child, td:first-child { border-right: 1px solid #353535; background: rgba(255,255,255,.018); }
    th:last-child, td:last-child { border-left: 1px solid #353535; }
    tbody tr:nth-child(even) td { background: rgba(255,255,255,.014); }
    tbody tr:hover td { background: rgba(31,224,132,.055); }
    .metric-name { font-weight: 500; text-transform: uppercase; white-space: nowrap; }
    .barbox { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
    .bar-title { margin: 0 0 14px; font-size: 15px; font-weight: 800; }
    .bar-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px 18px; }
    .bar-row { margin: 10px 0; }
    .bar-meta { display: flex; justify-content: space-between; gap: 10px; font-size: 12px; color: var(--muted); margin-bottom: 7px; }
    .track { height: 10px; background: #242424; border-radius: 999px; overflow: hidden; }
    .fill { height: 100%; border-radius: 999px; background: var(--green); width: 0; }
    .fill.old { background: var(--amber); }
    .note { margin-top: 16px; padding: 14px 16px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel-2); color: var(--muted); line-height: 1.55; font-size: 13px; }
    .source { margin-top: 10px; color: #777; font-size: 11px; line-height: 1.45; }
    @media (max-width: 900px) {
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .bar-grid { grid-template-columns: 1fr; }
      .section-head { align-items: start; flex-direction: column; }
      .periods { text-align: left; }
      th, td { padding: 11px 8px; font-size: 12px; }
    }
    @media (max-width: 560px) {
      .wrap { width: min(100% - 20px, 1180px); }
      .kpis { grid-template-columns: 1fr; }
      .tab { flex: 1 1 auto; }
      table { display: block; overflow-x: auto; white-space: nowrap; }
    }
  </style>

    const METRICS = [["investment","Investimento total","currency","neutral"],["impressions","Impressões","integer","higher"],["reach","Alcance","integer","higher"],["frequency","Frequência","decimal","lower"],["link_clicks","Cliques no link","integer","higher"],["cpc","CPC link","currency","lower"],["cpm","CPM","currency","lower"],["ctr","CTR link","percent","higher"],["conversations","Conversas | engajamento/mensagem","integer","higher"],["cost_per_conversation","Custo por conversa | engajamento/mensagem","currency","lower"],["total_conversations","Conversas totais | todas as campanhas","integer","higher"],["cost_per_total_conversation","Custo por conversa total","currency","lower"],["followers","Seguidores | tráfego","integer","higher"],["cost_per_follower","Custo por seguidor | tráfego","currency","lower"],["total_followers","Seguidores totais | todas as campanhas","integer","higher"],["cost_per_total_follower","Custo por seguidor total","currency","lower"]];
    const money = new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" });
    const integer = new Intl.NumberFormat("pt-BR", { maximumFractionDigits: 0 });
    const decimal = new Intl.NumberFormat("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const percentFmt = new Intl.NumberFormat("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    const fmt = (value, type) => {
      if (!Number.isFinite(value)) return "-";
      if (type === "currency") return money.format(value);
      if (type === "integer") return integer.format(value);
      if (type === "percent") return percentFmt.format(value) + "%";
      return decimal.format(value);
    };
    const delta = (now, old, direction) => {
      if (!old) return `<span class="delta neutral">sem base anterior</span>`;
      const raw = ((now - old) / old) * 100;
      let cls = "neutral";
      if (direction === "higher") cls = raw > 0 ? "up" : "down";
      if (direction === "lower") cls = raw < 0 ? "up" : "down";
      if (Math.abs(raw) < 0.01 || direction === "neutral") cls = "neutral";
      const sign = raw > 0 ? "+" : "";
      return `<span class="delta ${cls}">${sign}${percentFmt.format(raw)}% vs. anterior</span>`;
    };
    const row = (metric, current, previous) => {
      const [key, label, type, direction] = metric;
      return `<tr>
        <td class="metric-name">${label}</td>
        <td>${fmt(current[key], type)}</td>
        <td>${fmt(previous[key], type)}</td>
        <td>${delta(current[key], previous[key], direction)}</td>
      </tr>`;
    };
    const bars = (current, previous) => {
      const picks = [
        ["investment", "Investimento", "currency"],
        ["conversations", "Conversas | objetivo", "integer"],
        ["total_conversations", "Conversas | total", "integer"],
        ["followers", "Seguidores | tráfego", "integer"],
        ["total_followers", "Seguidores | total", "integer"],
        ["cost_per_conversation", "Custo por conversa", "currency"],
        ["cost_per_follower", "Custo por seguidor", "currency"]
      ];
      return picks.map(([key, label, type]) => {
        const max = Math.max(current[key] || 0, previous[key] || 0, 1);
        return `<div class="bar-row">
          <div class="bar-meta"><strong>${label} | Go Next</strong><span>${fmt(current[key], type)}</span></div>
          <div class="track"><div class="fill" style="width:${Math.max(2, (current[key] || 0) / max * 100)}%"></div></div>
          <div class="bar-meta" style="margin-top:8px"><strong>${label} | Anterior</strong><span>${fmt(previous[key], type)}</span></div>
          <div class="track"><div class="fill old" style="width:${Math.max(2, (previous[key] || 0) / max * 100)}%"></div></div>
        </div>`;
      }).join("");
    };
    const render = (name) => {
      const current = DATA[name]["Go Next"];
      const previous = DATA[name]["Gestão anterior"];
      document.querySelectorAll(".tab").forEach(btn => btn.classList.toggle("active", btn.dataset.name === name));
      document.getElementById("app").innerHTML = `
        <section>
          <div class="section-head">
            <h2>${name}</h2>
            <div class="periods"><strong>Go Next:</strong> ${current.period}<br><strong>Anterior:</strong> ${previous.period}</div>
          </div>
          <div class="kpis">
            <div class="kpi"><div class="label">Investimento Go Next</div><div class="value">${fmt(current.investment, "currency")}</div>${delta(current.investment, previous.investment, "neutral")}</div>
            <div class="kpi"><div class="label">Conversas | engajamento/mensagem</div><div class="value">${fmt(current.conversations, "integer")}</div>${delta(current.conversations, previous.conversations, "higher")}</div>
            <div class="kpi"><div class="label">Custo por conversa</div><div class="value">${fmt(current.cost_per_conversation, "currency")}</div>${delta(current.cost_per_conversation, previous.cost_per_conversation, "lower")}</div>
            <div class="kpi"><div class="label">Seguidores | tráfego</div><div class="value">${fmt(current.followers, "integer")}</div>${delta(current.followers, previous.followers, "higher")}</div>
          </div>
          <div class="grid">
            <table>
              <thead><tr><th>Métrica</th><th>Go Next</th><th>Anterior</th><th>Variação</th></tr></thead>
              <tbody>${METRICS.map(m => row(m, current, previous)).join("")}</tbody>
            </table>
            <aside class="barbox">
              <p class="bar-title">Leitura rápida</p>
              <div class="bar-grid">${bars(current, previous)}</div>
              <div class="note">Base ajustada: as linhas com objetivo usam conversas apenas em campanhas de engajamento/mensagem e seguidores apenas em campanhas de tráfego. As linhas totais mostram a mesma métrica somada em todas as campanhas, com custo calculado sobre o investimento total da gestão.</div>
            </aside>
          </div>
        </section>`;
    };
    Object.keys(DATA).forEach((name, index) => {
      const btn = document.createElement("button");
      btn.className = "tab";
      btn.dataset.name = name;
      btn.textContent = name;
      btn.addEventListener("click", () => render(name));
      document.getElementById("tabs").appendChild(btn);
      if (index === 0) render(name);
    });
  </script>
